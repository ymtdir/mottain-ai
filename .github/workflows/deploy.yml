name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: mottain-ai
  REGION: asia-northeast1
  SERVICE: mottain-ai
  REPOSITORY: mottain-ai
  DB_NAME: mottain_ai
  DB_USER: app
  CLOUD_SQL_PROXY_VERSION: v2.23.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 新イメージが期待するスキーマを先に適用してからデプロイする
      - name: Run database migrations
        run: |
          curl -sSfL -o cloud-sql-proxy "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/${CLOUD_SQL_PROXY_VERSION}/cloud-sql-proxy.linux.amd64"
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy "${PROJECT_ID}:${REGION}:${SERVICE}-pg" --port 5432 &
          for i in $(seq 1 30); do
            (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null && break
            sleep 1
          done
          # database-password は英数字のみで生成している（Terraform の
          # random_password で special = false）ため URL エンコード不要
          DB_PASSWORD="$(gcloud secrets versions access latest --secret=database-password)"
          DATABASE_URL="postgresql://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5432/${DB_NAME}" pnpm db:migrate

      - name: Configure Docker
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --region "${REGION}" \
            --platform managed \
            --add-cloudsql-instances "${PROJECT_ID}:${REGION}:${SERVICE}-pg" \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${PROJECT_ID},DB_SOCKET_PATH=/cloudsql/${PROJECT_ID}:${REGION}:${SERVICE}-pg,DEMO_NAME=demo" \
            --set-secrets "DATABASE_URL=database-url:latest,SESSION_SECRET=session-secret:latest,DEMO_EMAIL=demo@example.com:latest,DEMO_PASSWORD=demo-password:latest"
